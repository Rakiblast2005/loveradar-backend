spring:
  application:
    name: loveradar-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/loveradar
    username: postgres
    password: Rakiblast@2005
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET:change_this_super_secret_key_min_32_chars_long_please}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}      # 15 minutes
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 days

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

loveradar:
  proximity:
    check-interval-ms: 10000
    stale-location-seconds: 60
  rate-limit:
    capacity: 60
    refill-tokens: 60
    refill-duration-seconds: 60

logging:
  level:
    root: INFO
    com.loveradar: INFO
